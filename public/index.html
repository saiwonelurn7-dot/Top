<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTV - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #ffffff; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #0ea5e9 100%); }
    </style>
</head>
<body class="pb-10">

    <header class="flex justify-between items-center p-4 border-b border-gray-800 bg-gray-900 sticky top-0 z-50">
        <div class="text-2xl font-bold flex items-center gap-2 text-blue-500">
            <i class="fas fa-film"></i> TeleTV
        </div>
        <div class="flex gap-4 text-gray-400">
            <i class="fas fa-search text-xl cursor-pointer"></i>
            <i class="fas fa-bars text-xl cursor-pointer"></i>
        </div>
    </header>

    <div class="p-4">
        <div class="gradient-bg rounded-2xl p-6 text-white shadow-lg">
            <span class="bg-white/20 px-2 py-1 rounded text-xs font-bold mb-2 inline-block">DIRECT TO TELEGRAM</span>
            <h1 class="text-lg font-bold leading-snug">Movie နှင့် Series များကို Click တစ်ချက်နှိပ်ရုံဖြင့် Telegram တွင် အလွယ်တကူ ကြည့်ရှုနိုင်ပါသည်ဗျ</h1>
        </div>
    </div>

    <div class="p-4">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-blue-400">
            <i class="fas fa-play-circle"></i> Latest Updates
        </h2>
        
        <div id="movies-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            <p class="text-gray-400 col-span-full text-center py-10">Loading movies...</p>
        </div>
    </div>

    <script>
        // API မှ Movie များ လှမ်းယူခြင်း
        async def fetchMovies() {
            try {
                const response = await fetch('/api/movies');
                const movies = await response.json();
                const container = document.getElementById('movies-container');
                container.innerHTML = '';

                if(movies.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 col-span-full text-center">No movies available.</p>';
                    return;
                }

                movies.forEach(movie => {
                    const card = document.createElement('a');
                    card.href = `movie.html?id=${movie.slug}`;
                    card.className = "bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-lg block hover:scale-105 transition duration-200 relative";
                    
                    card.innerHTML = `
                        <div class="absolute top-2 left-2 bg-yellow-500 text-black text-xs font-bold px-1.5 py-0.5 rounded flex items-center gap-1 z-10">
                            <i class="fas fa-star text-[10px]"></i> ${movie.rating}
                        </div>
                        <div class="absolute top-2 right-2 bg-black/60 text-white text-[10px] font-bold px-2 py-0.5 rounded z-10">
                            1080p
                        </div>
                        <div class="w-full aspect-[2/3] bg-gray-800 overflow-hidden">
                            <img src="${movie.poster_url}" alt="${movie.title}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-3">
                            <h3 class="font-bold text-sm truncate">${movie.title}</h3>
                            <div class="flex items-center gap-2 text-xs text-gray-400 mt-1">
                                <span><i class="far fa-calendar"></i> ${movie.year}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching movies:", error);
                document.getElementById('movies-container').innerHTML = '<p class="text-red-500 col-span-full text-center">Failed to load movies.</p>';
            }
        }
        
        fetchMovies();
    </script>
</body>
</html>
